<!DOCTYPE html>
<HTML língua="pt-br">
<cabeça>
<meta conjunto de caracteres="UTF-8">
<título>Editor de texto do guia ZZZ</título>

<link relação="folha de estilo" href="estilo.css">

<!-- html2canvas -->
<roteiro fonte="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></roteiro>
</caboça>

<corpo>

<h1>EDITOR DE HABILIDADES - ZENLESS ZONE ZERO</h1>

<dividir classe="barra de ferramentas">

    <!-- ELEMENTOS -->
    <botão classe="elemento-btn elemento-éter" clicar em="embrulhar('éter')">Éter</botão>
    <botão classe="elemento-btn elemento-físico" clicar em="embrulhar('físico')">Físico</botão>
    <botão classe="elemento-btn elemento-gelo" clicar em="embrulhar('gelo')">Gelo</botão>
    <botão classe="elemento-btn elemento-fogo" clicar em="embrulhar('fogo')">Fogo</botão>
    <botão classe="elemento-btn elemento-elétrico" clicar em="embrulhar('elétrico')">Elétrico</botão>
    <botão classe="elemento-btn elemento-vida" clicar em="embrulhar('vida')">HP</botão>

    <button class="icon-btn" onclick="formatAllText()">📝</button>
    <!-- NEGRITO -->
    <botão classe="ícone-btn" clicar em="texto em negrito()">N</botão>

    <!-- HABILIDADES -->
    <botão classe="habilidade-btn" clicar em="inserirícone('básico')">Ataque Básico</botão>
    <botão classe="habilidade-btn" clicar em="inserirícone('especial')">Reforçado Especial</botão>
    <botão classe="habilidade-btn" clicar em="inserirícone('ajudar')">Assistência</botão>
    <botão classe="habilidade-btn" clicar em="inserirícone('desviar')">Esquiva</botão>
    <botão classe="habilidade-btn" clicar em="inserirícone('final')">Final</botão>
    <botão classe="habilidade-btn" clicar em="inserirícone('principal')">Hábito. Principal</botão>

    <!-- BAIXAR -->
    <botão classe="ícone-btn" clicar em="exportarImagem()">⬇</botão>

    <!-- COPIAR -->
    <botão classe="ícone-btn" clicar em="copiarImagem()">📋</botão>

</dividir>

<dividir classe="editor" conteúdo="verdadeiro" id="editor">
Digite seu texto aqui...
</dividir>

<dividir classe="caixa de visualização" id="prévia"></dividir>

<roteiro fonte="script.js"></roteiro>

</corpo>

</HTML>
